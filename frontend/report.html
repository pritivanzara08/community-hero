<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue - Community Hero</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<body data-page="report">
  <header class="topbar">
    <a class="brand" href="index.html">Community Hero</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <section class="page-title">
      <p class="eyebrow">Citizen reporting</p>
      <h1>Report a local issue</h1>
      <p>Capture the problem, location, and category so the community can verify and track it.</p>
    </section>

    <section class="split wide-left">
      <div class="panel">
        <h2>Issue Details</h2>
        <form id="issueForm">
          <input type="text" id="title" placeholder="Issue Title (e.g., Pothole near main gate)" required>
          <textarea id="description" rows="5" placeholder="Describe what happened, nearby landmark, and urgency." required></textarea>
          <label for="imageUpload">Upload Image/Photo of Evidence (Optional):</label>
          <input type="file" id="imageUpload" accept="image/*">
          <label>Pinpoint Location:</label>
          <div id="map" style="height: 300px; width: 100%; margin-bottom: 15px; border-radius: 8px;"></div>
          <input type="hidden" id="latitude" name="latitude">
          <input type="hidden" id="longitude" name="longitude">
          <label for="category">Category:</label>
          <select id="category" name="category" required>
            <option value="">Let AI suggest</option>
            <option value="Road Damage">Road Damage</option>
            <option value="Water Leakage">Water Leakage</option>
            <option value="Waste Management">Waste Management</option>
            <option value="Streetlight Issue">Streetlight Issue</option>
            <option value="General Civic Issue">General Civic Issue</option>
          </select>
          <button class="btn primary" type="submit">Submit Report</button>
        </form>

          <label>Title<input type="text" name="title" placeholder="Pothole near main gate" required></label>
          <label>Description<textarea name="description" rows="5" placeholder="Describe what happened, nearby landmark, and urgency."></textarea></label>
          <label>Category
            <select name="category">

          <button class="button ghost" type="button" id="useLocationBtn">Use My Location</button>
          <button class="button primary" type="submit">Submit Report</button>
        </form> -->
        <p id="reportMessage" class="message"></p>
      </div>

      <div class="panel">
        <div class="section-head">
          <h2>Community Issues</h2>
          <button class="button small" id="refreshIssuesBtn">Refresh</button>
        </div>
        <div id="allIssues" class="issue-list tall"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
