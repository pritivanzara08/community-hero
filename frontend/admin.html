<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Community Hero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="topbar">
    <a class="brand" href="index.html">Community Hero</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <section class="page-title">
      <p class="eyebrow">Admin workspace</p>
      <h1>Manage reported issues</h1>
      <p>Update status as departments validate, assign, resolve, or reject community reports.</p>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>Issue Queue</h2>
        <button class="button small" id="adminRefreshBtn">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Issue</th>
              <th>AI Category</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminIssueRows"></tbody>
        </table>
      </div>
      <p id="adminMessage" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
